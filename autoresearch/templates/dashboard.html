<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="5">
  <title>autoresearch dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root {
      --bg: #0a0c10;
      --surface: #161b22;
      --surface-hero: #1a1f26;
      --surface-sunken: #13181f;
      --hairline: rgba(255, 255, 255, 0.07);
      --glass: rgba(255, 255, 255, 0.045);
      --glass-border: rgba(255, 255, 255, 0.10);
      --glass-blur: blur(20px) saturate(140%);
      --elev: 0 8px 32px rgba(0, 0, 0, 0.40);
      --inner-hi: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --text-dim: #6e7681;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --amber: #d29922;
      --orange: #f0883e;
      --radius: 12px;
      --ease: cubic-bezier(0.2, 0, 0, 1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text); padding: 32px; min-height: 100vh;
      background:
        radial-gradient(1100px 560px at 12% -10%, rgba(88, 166, 255, 0.12), transparent 56%),
        radial-gradient(760px 420px at 92% 4%, rgba(88, 166, 255, 0.05), transparent 60%),
        var(--bg);
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
    }
    /* Aligned numerals everywhere numbers refresh */
    .stat-card .value, td { font-variant-numeric: tabular-nums; }

    .header { margin-bottom: 28px; }
    .header h1 {
      font-size: 18px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 6px;
      width: fit-content;
      background: linear-gradient(90deg, #ffffff, #9fb6d4);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .header .goal { font-size: 12px; color: var(--text-dim); line-height: 1.5; }
    .status {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 500; padding: 3px 9px;
      border-radius: 20px; margin-top: 8px; letter-spacing: 0.02em;
    }
    .status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .status-running  { color: var(--orange); background: rgba(240, 136, 62, 0.12); }
    .status-complete { color: var(--green);  background: rgba(63, 185, 80, 0.12); }
    .status-paused   { color: var(--amber);  background: rgba(210, 153, 34, 0.12); }
    .status-error    { color: var(--red);    background: rgba(248, 81, 73, 0.12); }

    .summary { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-card {
      background: var(--glass);
      -webkit-backdrop-filter: var(--glass-blur); backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border); box-shadow: var(--inner-hi), var(--elev);
      border-radius: var(--radius); padding: 18px 20px; min-width: 150px; flex: 1;
    }
    .stat-card .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
    .stat-card .value { font-size: 20px; font-weight: 500; margin-top: 6px; letter-spacing: -0.01em; }
    .stat-card.hero {
      background: radial-gradient(130% 130% at 0% 0%, rgba(88, 166, 255, 0.16), transparent 58%), var(--glass);
      border-color: rgba(88, 166, 255, 0.22);
      box-shadow: var(--inner-hi), var(--elev), 0 0 44px -10px rgba(88, 166, 255, 0.30);
    }
    .stat-card.hero .value { font-size: 32px; font-weight: 600; letter-spacing: -0.02em; }
    .stat-card .value.positive { color: var(--green); }
    .stat-card .value.negative { color: var(--red); }
    .stat-card .value.neutral { color: var(--accent); }

    .chart-container {
      background: var(--glass);
      -webkit-backdrop-filter: var(--glass-blur); backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border); box-shadow: var(--inner-hi), var(--elev);
      border-radius: var(--radius); padding: 20px 20px 16px; margin-bottom: 24px;
    }
    .chart-container h2 { font-size: 11px; color: var(--text-muted); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }

    table { width: 100%; border-collapse: collapse; background: rgba(13, 17, 23, 0.55); -webkit-backdrop-filter: var(--glass-blur); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); box-shadow: var(--inner-hi), var(--elev); border-radius: var(--radius); overflow: hidden; }
    th { background: rgba(255, 255, 255, 0.03); text-align: left; padding: 10px 14px; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; border-bottom: 1px solid var(--glass-border); }
    td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    tr:last-child td { border-bottom: none; }
    tr.kept td { border-left: 2px solid var(--green); }
    tr.discarded td { border-left: 2px solid var(--red); }
    tr.baseline td { border-left: 2px solid var(--accent); }
    tr.research td { border-left: 2px solid var(--amber); background: #15130a; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge-kept { background: rgba(63, 185, 80, 0.15); color: var(--green); }
    .badge-discarded { background: rgba(248, 81, 73, 0.15); color: var(--red); }
    .badge-baseline { background: rgba(88, 166, 255, 0.15); color: var(--accent); }
    .badge-research { background: rgba(210, 153, 34, 0.15); color: var(--amber); }
    .expandable { cursor: pointer; transition: background 120ms var(--ease); }
    .expandable:hover { background: #14191f; }
    .detail-row { display: none; }
    .detail-row.open { display: table-row; }
    .detail-row td { padding: 12px 16px; background: #0f1318; font-size: 12px; white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--text-muted); border-left: 2px solid var(--hairline); }
    .delta-positive { color: var(--red); }
    .delta-negative { color: var(--green); }
    .delta-zero { color: var(--text-muted); }

    /* ---- Motion: Corporate personality, reduced-motion gated ---- */
    @media (prefers-reduced-motion: no-preference) {
      .stat-card { animation: rise 240ms var(--ease) both; }
      .stat-card:nth-child(2) { animation-delay: 40ms; }
      .stat-card:nth-child(3) { animation-delay: 80ms; }
      .stat-card:nth-child(4) { animation-delay: 120ms; }
      .chart-container { animation: rise 240ms var(--ease) 140ms both; }
      #iterationTable { animation: rise 240ms var(--ease) 180ms both; }
      .detail-row.open td { animation: detailIn 200ms var(--ease) both; }
      .status-running::before { animation: pulse 1.8s ease-in-out infinite; }
    }
    @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes detailIn { from { opacity: 0; transform: translateY(-2px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

    /* Solid fallback when the OS requests reduced transparency (taste mandate) */
    @media (prefers-reduced-transparency: reduce) {
      body { background: var(--bg); }
      .stat-card, .chart-container, table {
        -webkit-backdrop-filter: none; backdrop-filter: none;
        background: var(--surface); box-shadow: 0 0 0 1px var(--hairline);
      }
      .stat-card.hero { background: var(--surface-hero); }
      th { background: var(--bg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>autoresearch dashboard</h1>
    <div class="goal" id="goal"></div>
    <div class="status" id="status"></div>
  </div>

  <div class="summary" id="summary"></div>

  <div class="chart-container">
    <h2>Score Over Iterations</h2>
    <canvas id="scoreChart" height="80"></canvas>
  </div>

  <table id="iterationTable">
    <thead>
      <tr>
        <th>#</th>
        <th>Score</th>
        <th>Delta</th>
        <th>Status</th>
        <th>What was tried</th>
      </tr>
    </thead>
    <tbody id="iterationBody"></tbody>
  </table>

  <script>
    const DATA = {{DATA_JSON}};

    // Header
    document.getElementById('goal').textContent = 'Goal: ' + DATA.goal;
    const statusEl = document.getElementById('status');
    const experiments = DATA.iterations.filter(i => i.type === 'experiment');
    const maxIter = DATA.config.max_iterations;
    const statusText = DATA.status === 'running'
      ? `Running (iteration ${experiments.length}/${maxIter})`
      : DATA.status.charAt(0).toUpperCase() + DATA.status.slice(1);
    statusEl.textContent = 'Status: ' + statusText;
    statusEl.className = 'status status-' + DATA.status;

    // Stop auto-refresh if complete
    if (DATA.status === 'complete' || DATA.status === 'error') {
      const meta = document.querySelector('meta[http-equiv="refresh"]');
      if (meta) meta.remove();
    }

    // Summary stats
    const summaryEl = document.getElementById('summary');
    const keptExperiments = experiments.filter(e => e.status === 'kept');
    const discardedExperiments = experiments.filter(e => e.status === 'discarded');

    // Find primary metric
    const metricNames = DATA.config.metrics.length > 0
      ? DATA.config.metrics.map(m => m.name)
      : (DATA.baseline && DATA.baseline.scores ? Object.keys(DATA.baseline.scores) : []);
    const primaryMetric = metricNames[0] || 'score';
    const baselineScore = DATA.baseline && DATA.baseline.scores ? DATA.baseline.scores[primaryMetric] : null;

    // Infer direction from kept iterations' trend vs baseline.
    // If latest kept score > baseline → higher_is_better; if < → lower_is_better.
    // Override with DATA.config.metrics[0].direction when populated.
    function inferDirection() {
      const kept = experiments.filter(e => e.status === 'kept');
      if (kept.length === 0 || baselineScore == null) return 'higher_is_better';
      const latest = kept[kept.length - 1].scores[primaryMetric];
      if (latest == null || latest === baselineScore) return 'higher_is_better';
      return latest > baselineScore ? 'higher_is_better' : 'lower_is_better';
    }
    const metricDirection = DATA.config.metrics.length > 0
      ? DATA.config.metrics[0].direction
      : inferDirection();

    const bestExperiment = keptExperiments.length > 0
      ? keptExperiments.reduce((best, e) => {
          const s = e.scores[primaryMetric];
          const b = best.scores[primaryMetric];
          return metricDirection === 'lower_is_better' ? (s < b ? e : best) : (s > b ? e : best);
        })
      : null;
    const bestScore = bestExperiment ? bestExperiment.scores[primaryMetric] : baselineScore;

    const improvement = baselineScore && bestScore
      ? (metricDirection === 'higher_is_better'
          ? ((bestScore - baselineScore) / baselineScore * 100).toFixed(1)
          : ((baselineScore - bestScore) / baselineScore * 100).toFixed(1))
      : 0;

    const cards = [
      { label: 'Baseline', value: baselineScore !== null ? baselineScore : '—', cls: 'neutral' },
      { label: 'Best', value: bestScore !== null ? bestScore : '—', cls: 'positive' },
      { label: 'Improvement', value: improvement + '%', cls: parseFloat(improvement) > 0 ? 'positive' : 'neutral' },
      { label: 'Kept / Total', value: `${keptExperiments.length} / ${experiments.length}`, cls: 'neutral' },
    ];
    cards.forEach(c => {
      const heroClass = (c.label === 'Best' || c.label === 'Improvement') ? ' hero' : '';
      summaryEl.innerHTML += `<div class="stat-card${heroClass}"><div class="label">${c.label}</div><div class="value ${c.cls}">${c.value}</div></div>`;
    });

    // Chart
    const chartLabels = ['Baseline', ...experiments.map((_, i) => `#${i + 1}`)];
    const chartData = [baselineScore, ...experiments.map(e => e.scores[primaryMetric])];
    const chartColors = ['#58a6ff', ...experiments.map(e => e.status === 'kept' ? '#3fb950' : '#f85149')];
    const pointStyles = ['circle', ...experiments.map(e => e.status === 'kept' ? 'circle' : 'crossRot')];

    new Chart(document.getElementById('scoreChart'), {
      type: 'line',
      data: {
        labels: chartLabels,
        datasets: [{
          label: primaryMetric,
          data: chartData,
          borderColor: 'rgba(88, 166, 255, 0.6)',
          borderWidth: 1.5,
          backgroundColor: (ctx) => {
            const { ctx: c, chartArea } = ctx.chart;
            if (!chartArea) return 'transparent';
            const gradient = c.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
            gradient.addColorStop(0, 'rgba(88, 166, 255, 0.12)');
            gradient.addColorStop(1, 'rgba(88, 166, 255, 0)');
            return gradient;
          },
          fill: true,
          pointBackgroundColor: chartColors,
          pointBorderColor: chartColors,
          pointBorderWidth: 0,
          pointRadius: 5,
          pointHoverRadius: 7,
          pointStyle: pointStyles,
          tension: 0.3,
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (ctx) => `${primaryMetric}: ${ctx.raw}`
            }
          }
        },
        scales: {
          x: { grid: { color: '#21262d' }, ticks: { color: '#8b949e' } },
          y: {
            grid: { color: '#21262d' },
            ticks: { color: '#8b949e' },
            reverse: metricDirection === 'lower_is_better'
          }
        }
      }
    });

    // Iteration table
    const tbody = document.getElementById('iterationBody');

    // Baseline row
    if (DATA.baseline) {
      tbody.innerHTML += `<tr class="baseline">
        <td>0</td>
        <td>${baselineScore !== null ? baselineScore : '—'}</td>
        <td>—</td>
        <td><span class="status-badge badge-baseline">baseline</span></td>
        <td>Baseline measurement</td>
      </tr>`;
    }

    // Iteration rows (reversed — newest first after baseline)
    const allIterations = [...DATA.iterations].reverse();
    allIterations.forEach((iter, idx) => {
      if (iter.type === 'research') {
        tbody.innerHTML += `<tr class="research expandable" onclick="toggleDetail('detail-${iter.id}')">
          <td>R</td>
          <td colspan="2">—</td>
          <td><span class="status-badge badge-research">research</span></td>
          <td>${iter.query}</td>
        </tr>
        <tr class="detail-row" id="detail-${iter.id}">
          <td colspan="5">URLs: ${(iter.urls || []).join(', ')}\nLearned: ${iter.learned}</td>
        </tr>`;
      } else {
        const score = iter.scores[primaryMetric];
        const delta = iter.delta ? iter.delta[primaryMetric] : 0;
        const deltaStr = delta > 0 ? `+${delta}` : `${delta}`;
        const deltaCls = delta < 0 && metricDirection === 'lower_is_better' ? 'delta-negative'
          : delta > 0 && metricDirection === 'higher_is_better' ? 'delta-negative'
          : delta === 0 ? 'delta-zero' : 'delta-positive';
        const statusBadge = iter.status === 'kept' ? 'badge-kept' : 'badge-discarded';
        const statusLabel = iter.status === 'kept' ? 'kept' : 'discarded';
        const rowCls = iter.status === 'kept' ? 'kept' : 'discarded';

        tbody.innerHTML += `<tr class="${rowCls} expandable" onclick="toggleDetail('detail-${iter.id}')">
          <td>${iter.id}</td>
          <td>${score}</td>
          <td class="${deltaCls}">${deltaStr}</td>
          <td><span class="status-badge ${statusBadge}">${statusLabel}</span></td>
          <td>${iter.hypothesis}</td>
        </tr>
        <tr class="detail-row" id="detail-${iter.id}">
          <td colspan="5">Reasoning: ${iter.reasoning}\nDiff: ${iter.diff_summary}${iter.commit_sha ? '\nCommit: ' + iter.commit_sha : ''}</td>
        </tr>`;
      }
    });

    function toggleDetail(id) {
      const el = document.getElementById(id);
      if (el) el.classList.toggle('open');
    }
  </script>
</body>
</html>
